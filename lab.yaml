# Lima config for linux-ops-lab-week1.
# Pins explicitly to Ubuntu Server 24.04 LTS (Noble Numbat) so every student
# runs the same kernel + package set during the cohort.
#
# Usage:
#   limactl start --name=linux-ops-lab ./lab.yaml
#
# Re-run on a clean machine to get an identical VM.

# Lab VM profile (matches the docx spec)
cpus: 1
memory: "1GiB"
disk: "8GiB"

images:
  # Noble Numbat (24.04) cloud images. Lima auto-picks the right one for your arch.
  - location: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# Mount ONLY a dedicated host folder (~/devops-lab) into the VM.
#
# Safety rationale: scripts in this lab run as root inside the VM. By mounting
# only ~/devops-lab — not your whole home directory — a stray `sudo rm -rf` or
# misconfigured `chown` inside the VM cannot reach files outside that folder.
#
# Create the folder on the host BEFORE running `limactl start`:
#   mkdir -p ~/devops-lab
#
# Inside the VM the folder is reachable at /home/<your-user>/devops-lab.
mounts:
  - location: "~/devops-lab"
    writable: true

# Forward the lab API to the host. Comment out if you don't want :8080 reachable
# from macOS — students can always `curl` from inside `limactl shell`.
portForwards:
  - guestPort: 8080
    hostPort: 8080
  - guestPort: 9080
    hostPort: 9080
  - guestPort: 9081
    hostPort: 9081
  - guestPort: 9082
    hostPort: 9082
  - guestPort: 9083
    hostPort: 9083

# Set the in-VM hostname. Lima has no top-level `hostname:` field, so we use a
# system-mode provisioning script. Runs once on first boot.
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eu
      hostnamectl set-hostname linux-ops-lab
      apt-get update -qq
      apt-get install -y -qq make
